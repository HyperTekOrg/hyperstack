name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-crate-files:
    name: Check Rust Crate LICENSE and README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Rust crates have LICENSE and README.md
        run: |
          #!/bin/bash
          set -e

          # Extract Rust package paths from release-please-config.json
          # We filter for packages with "release-type": "rust"
          RUST_CRATES=$(jq -r '.packages | to_entries[] | select(.value."release-type" == "rust") | .key' release-please-config.json)

          MISSING_FILES=0

          echo "Checking Rust crates listed in release-please..."
          echo ""

          for crate_path in $RUST_CRATES; do
            echo "Checking: $crate_path"

            # Check for LICENSE file
            if [ ! -f "$crate_path/LICENSE" ] && [ ! -f "$crate_path/LICENSE.txt" ] && [ ! -f "$crate_path/LICENSE-MIT" ] && [ ! -f "$crate_path/LICENSE-APACHE" ] && [ ! -f "$crate_path/LICENCE" ]; then
              echo "  ❌ MISSING: LICENSE file not found"
              MISSING_FILES=$((MISSING_FILES + 1))
            else
              echo "  ✓ LICENSE found"
            fi

            # Check for README.md file
            if [ ! -f "$crate_path/README.md" ]; then
              echo "  ❌ MISSING: README.md file not found"
              MISSING_FILES=$((MISSING_FILES + 1))
            else
              echo "  ✓ README.md found"
            fi

            echo ""
          done

          if [ $MISSING_FILES -gt 0 ]; then
            echo "::error::$MISSING_FILES required file(s) missing across Rust crates"
            exit 1
          fi

          echo "✓ All Rust crates have required LICENSE and README.md files"

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  typescript-core:
    name: TypeScript Core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript/core
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: typescript/core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  typescript-react:
    name: TypeScript React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build core dependency
        working-directory: typescript/core
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: typescript/react
        run: npm ci

      - name: Build
        working-directory: typescript/react
        run: npm run build

      - name: Test
        working-directory: typescript/react
        run: npm test

  typescript-stacks:
    name: TypeScript Stacks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build core dependency
        working-directory: typescript/core
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: stacks/sdk/typescript
        run: npm ci

      - name: Build
        working-directory: stacks/sdk/typescript
        run: npm run build

  # Validates that generated SDKs are up-to-date with their source ASTs.
  # This prevents publishing stale SDKs when stack definitions change.
  validate-generated-sdks:
    name: Validate Generated SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sdk-validate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sdk-validate-
            ${{ runner.os }}-cargo-

      - name: Build stack crates (regenerate ASTs)
        run: |
          cargo build --manifest-path stacks/ore/Cargo.toml

      - name: Install hyperstack-cli
        run: cargo install --path cli

      - name: Regenerate TypeScript SDKs
        run: |
          hs sdk create typescript ore --config stacks/ore/hyperstack.toml

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain stacks/sdk/)" ]; then
            echo "::error::Generated SDKs are out of date with their source ASTs!"
            echo ""
            echo "The TypeScript SDKs in stacks/sdk/typescript/src/ do not match the"
            echo "current stack definitions. This can happen when:"
            echo "  1. Stack spec files (stacks/*/src/*.rs) were modified"
            echo "  2. The hyperstack-macros or interpreter crates were updated"
            echo "  3. SDKs were not regenerated after changes"
            echo ""
            echo "To fix this, run the following locally and commit the changes:"
            echo ""
            echo "  cargo build --manifest-path stacks/ore/Cargo.toml"
            echo "  hs sdk create typescript ore --config stacks/ore/hyperstack.toml"
            echo ""
            echo "Files that differ:"
            git status --porcelain stacks/sdk/
            echo ""
            echo "Diff:"
            git diff stacks/sdk/
            exit 1
          fi
          echo "✓ Generated SDKs are up-to-date"

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/hyperstack-sdk
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Install test dependencies
        run: pip install pytest
        # continue-on-error: true

      - name: Run tests
        run: pytest || echo "No tests found or tests skipped"
        # continue-on-error: true

  docs:
    name: Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
